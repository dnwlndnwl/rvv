<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Visual Novel x Rhythm Game</title>
    <style>
        :root { --bg: #0a0a0f; --panel: rgba(15, 15, 25, 0.95); --accent: #f97316; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #f0eee8; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; height: 100vh; }
        
        /* 레이어 설정 */
        #vn-layer, #rhythm-layer { position: absolute; inset: 0; width: 100%; height: 100%; transition: opacity 0.5s; }
        #rhythm-layer { display: none; background: #000; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }

        /* 배경 및 캐릭터 */
        #background { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: -1; filter: brightness(0.5); transition: 1s; }
        #characters { position: absolute; bottom: 120px; left: 0; right: 0; display: flex; justify-content: center; gap: 60px; pointer-events: none; }
        .character-img { height: 75vh; object-fit: contain; transition: 0.4s; opacity: 0; transform: translateY(20px); }
        .character-img.visible { opacity: 0.6; transform: translateY(0); }
        .character-img.active { opacity: 1; filter: brightness(1.1); transform: scale(1.05); z-index: 10; }

        /* 대화창 */
        #dialogue-box { position: absolute; bottom: 0; width: 100%; background: var(--panel); border-top: 1px solid rgba(255,255,255,0.15); padding: 35px 60px; box-sizing: border-box; min-height: 220px; backdrop-filter: blur(10px); }
        #speaker { font-weight: bold; color: var(--accent); margin-bottom: 12px; font-size: 1.5rem; text-shadow: 0 0 10px rgba(249, 115, 22, 0.3); }
        #text { font-size: 1.25rem; line-height: 1.8; min-height: 3em; }
        #next-btn { float: right; background: rgba(255,255,255,0.05); border: 1px solid #444; color: #fff; padding: 12px 30px; cursor: pointer; border-radius: 4px; font-size: 1rem; transition: 0.2s; }
        #next-btn:hover { background: var(--accent); border-color: var(--accent); }

        /* 리듬게임 UI */
        #game-canvas-container { position: relative; width: 500px; height: 100vh; background: rgba(20, 20, 30, 0.8); border-left: 2px solid #333; border-right: 2px solid #333; }
        #combo { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 80px; font-weight: bold; color: #fff; text-shadow: 0 0 20px #7b6ff0; pointer-events: none; }
        #judge { position: absolute; top: 38%; width: 100%; text-align: center; font-size: 32px; font-weight: bold; color: #ffcc00; pointer-events: none; }
    </style>
</head>
<body>
    <div id="vn-layer">
        <div id="background"></div>
        <div id="characters">
            <img id="char-nina" class="character-img" src="" />
            <img id="char-seeu" class="character-img" src="" />
        </div>
        <div id="dialogue-box">
            <div id="speaker"></div>
            <div id="text">시작하는 중...</div>
            <button id="next-btn">NEXT ▶</button>
        </div>
    </div>

    <div id="rhythm-layer">
        <div id="game-canvas-container">
            <canvas id="canvas"></canvas>
            <div id="combo">0</div>
            <div id="judge">READY</div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // [1. 이미지/사운드 링크화 (하드코딩)]
        const ASSETS = {
            bg: "assets/images/classroom.webp",
            nina: {
                normal: "assets/images/nina/nina-normal.png",
                bad: "assets/images/nina/nina-bad.png",
                shy: "assets/images/nina/nina-shy.png"
            },
            seeu: {
                normal: "assets/images/seeu/seeu-normal.png",
                no: "assets/images/seeu/seeu-no.png",
                crazy: "assets/images/seeu/seeu-crazy.png",
                shy: "assets/images/seeu/seeu-shy.png"
            },
            music: "assets/sounds/flos.mp3"
        };

        // [2. 스토리 데이터 하드코딩]
        const STORY_DATA = [
            { id: 0, bg: ASSETS.bg, active: "none", text: "전학 갈 학교로 향하는 길. 낯선 풍경들 사이로 벚꽃 잎이 흩날리고 있었다." },
            { id: 1, bg: ASSETS.bg, seeu: ASSETS.seeu.normal, active: "seeu", text: "저 멀리 앞서 걷는 한 소녀의 뒷모습에 시선을 빼앗겼다." },
            { id: 2, bg: ASSETS.bg, seeu: ASSETS.seeu.normal, active: "seeu", text: "바람에 찰랑이는 검은 머리카락... 진짜 말도 안 되게 예뻤다." },
            { id: 3, bg: ASSETS.bg, active: "none", text: "(...와, 저런 애가 우리 학교에 있다고?)" },
            { id: 4, bg: ASSETS.bg, active: "none", text: "어색한 공기 속에서 내 시선은 자연스럽게 창가 쪽 뒷자리를 향했다." },
            { id: 5, bg: ASSETS.bg, seeu: ASSETS.seeu.normal, active: "seeu", text: "......! 아까 그 애다. 소녀가 무심한 표정으로 창밖을 보고 있었다." },
            { id: 6, bg: ASSETS.bg, active: "none", text: "나는 자석에 이끌리듯 그녀의 옆자리로 다가갔다." },
            { id: 7, bg: ASSETS.bg, active: "none", text: "안녕, 아까 아침에 널 본 것 같은데... 이름이 뭐야?" },
            { id: 8, bg: ASSETS.bg, seeu: ASSETS.seeu.no, active: "seeu", text: "......?" },
            { id: 9, bg: ASSETS.bg, nina: ASSETS.nina.bad, active: "nina", text: "어머, 전학생. 짐도 풀기 전에 작업부터 거는 거야?" },
            { id: 10, bg: ASSETS.bg, speaker: "니나", nina: ASSETS.nina.normal, active: "nina", text: "난 니나. 시유의 절친이자 전속 매니저랄까. 나를 거쳐야 하거든?" },
            { id: 11, bg: ASSETS.bg, nina: ASSETS.nina.bad, speaker: "니나", active: "nina", text: "마침 오늘 방과 후 연습에 반주자가 펑크를 냈어. 합주실에서 실력을 증명해봐!" },
            { id: 12, bg: ASSETS.bg, seeu: ASSETS.seeu.normal, nina: ASSETS.nina.normal, active: "none", text: "음악실. 시유가 첼로를 고쳐 잡으며 나를 빤히 쳐다보았다." },
            { id: 13, bg: ASSETS.bg, seeu: ASSETS.seeu.crazy, active: "seeu", text: "......주의하세요. 제 첼로는 당신의 박자를 무참히 짓밟아버릴지도 모르니까요." },
            { id: 14, bg: ASSETS.bg, nina: ASSETS.nina.bad, speaker: "니나", active: "nina", text: "자, 시작한다! 네 손가락이 버티나 시유의 현이 터지나 한번 보자고!" },
            { id: 15, type: "rhythm_start", text: "연주를 시작합니다..." },
            { id: 16, bg: ASSETS.bg, nina: ASSETS.nina.shy, speaker: "니나", active: "nina", text: "하아... 하아... 말도 안 돼. 시유의 그 미친 폭주를 다 받아냈다고?" },
            { id: 17, bg: ASSETS.bg, seeu: ASSETS.seeu.normal, speaker: "시유", active: "seeu", text: "후후... 피아노 소리가 첼로의 심장을 찔렀네요. 당신, 꽤 '위험한' 사람이군요." },
            { id: 18, bg: ASSETS.bg, seeu: ASSETS.seeu.shy, speaker: "시유", active: "seeu", text: "전학생... 이름이 뭐예요? 내일도... 이 시간에 와 줄 거죠? 약속이에요." },
            { id: 19, bg: ASSETS.bg, active: "none", text: "그녀의 미소에 심장이 요동치기 시작했다. 전학 첫날, 말도 안 되는 일이 벌어졌다." }
        ];

        // [3. 리듬게임 차트 하드코딩 (샘플)]
        const CHART_DATA = [
            { time: 2000, lane: 0 }, { time: 2500, lane: 1 }, { time: 3000, lane: 2 }, { time: 3500, lane: 3 },
            { time: 4000, lane: 1 }, { time: 4500, lane: 2 }, { time: 5000, lane: 0 }, { time: 5500, lane: 3 },
            { time: 6000, lane: 1 }, { time: 6200, lane: 2 }, { time: 6400, lane: 1 }, { time: 7000, lane: 0 }
            // 실제 데이터는 여기에 더 추가 가능
        ];

        let currentId = 0;
        let isPlaying = false;
        let combo = 0;
        let activeNotes = [];

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const audio = document.getElementById("audio-player");

        // [장면 전환 로직]
        function renderScene(id) {
            const scene = STORY_DATA[id];
            if (!scene) { alert("이야기가 끝났습니다."); return; }
            currentId = id;

            // 배경
            document.getElementById("background").style.backgroundImage = `url('${scene.bg || ASSETS.bg}')`;

            // 캐릭터 이미지 & 가시성
            const nina = document.getElementById("char-nina");
            const seeu = document.getElementById("char-seeu");

            if (scene.nina) { nina.src = scene.nina; nina.classList.add("visible"); }
            else { nina.classList.remove("visible"); }

            if (scene.seeu) { seeu.src = scene.seeu; seeu.classList.add("visible"); }
            else { seeu.classList.remove("visible"); }

            // 누가 말하고 있는가?
            nina.classList.toggle("active", scene.active === "nina");
            seeu.classList.toggle("active", scene.active === "seeu");

            // 텍스트
            document.getElementById("speaker").textContent = scene.speaker || "";
            document.getElementById("text").textContent = scene.text;

            // 버튼 로직
            const nextBtn = document.getElementById("next-btn");
            if (scene.type === "rhythm_start") {
                nextBtn.textContent = "🎹 연주 시작";
                nextBtn.onclick = startRhythm;
            } else {
                nextBtn.textContent = "NEXT ▶";
                nextBtn.onclick = () => renderScene(currentId + 1);
            }
        }

        // [리듬게임 엔진]
        function startRhythm() {
            document.getElementById("vn-layer").style.display = "none";
            document.getElementById("rhythm-layer").style.display = "flex";

            activeNotes = CHART_DATA.map(n => ({ ...n, hit: false }));
            audio.src = ASSETS.music;
            audio.play();
            isPlaying = true;
            combo = 0;
            updateHUD("READY", "#fff");

            requestAnimationFrame(gameLoop);

            audio.onended = () => {
                isPlaying = false;
                document.getElementById("rhythm-layer").style.display = "none";
                document.getElementById("vn-layer").style.display = "block";
                renderScene(16); // 게임 끝나고 16번 장면으로
            };
        }

        function gameLoop() {
            if (!isPlaying) return;
            const time = audio.currentTime * 1000;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 판정선
            ctx.fillStyle = "rgba(255, 0, 0, 0.5)";
            ctx.fillRect(0, canvas.height - 100, canvas.width, 5);

            // 노트 그리기
            ctx.fillStyle = "#fff";
            activeNotes.forEach(n => {
                if (n.hit) return;
                const y = (time - n.time) * 0.8 + (canvas.height - 100);
                if (y > 0 && y < canvas.height + 50) {
                    ctx.fillRect(n.lane * (canvas.width / 4) + 10, y - 10, (canvas.width / 4) - 20, 20);
                }
                // 놓쳤을 때
                if (y > canvas.height && !n.hit) {
                    n.hit = true;
                    combo = 0;
                    updateHUD("MISS", "red");
                }
            });
            requestAnimationFrame(gameLoop);
        }

        function updateHUD(txt, col) {
            document.getElementById("combo").textContent = combo;
            const j = document.getElementById("judge");
            j.textContent = txt;
            j.style.color = col;
        }

        // 키 입력 처리 (D, F, J, K)
        window.addEventListener("keydown", (e) => {
            if (!isPlaying) return;
            const keys = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
            const lane = keys[e.key.toLowerCase()];
            
            if (lane !== undefined) {
                const time = audio.currentTime * 1000;
                const note = activeNotes.find(n => !n.hit && n.lane === lane && Math.abs(n.time - time) < 150);
                if (note) {
                    note.hit = true;
                    combo++;
                    updateHUD("PERFECT", "#ffcc00");
                }
            }
        });

        // 시작 버튼 없이 바로 첫 장면 실행
        window.onload = () => {
            canvas.width = 500;
            canvas.height = window.innerHeight;
            renderScene(0);
        };
    </script>
</body>
</html>
